<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML to Webflow Converter</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header">
    <div class="header-left">
      <div class="logo">HTML <span>to</span> Webflow</div>
      <span class="badge">v1.0</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" id="convertBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
        Convert
      </button>
    </div>
  </header>

  <main class="main">
    <!-- Input Panel -->
    <div class="panel" id="inputPanel">
      <div class="tabs">
        <button class="tab active" data-tab="html">HTML <span class="dot"></span></button>
        <button class="tab" data-tab="css">CSS <span class="dot"></span></button>
        <button class="tab" data-tab="js">JS <span class="dot"></span></button>
      </div>
      <div class="code-container">
        <textarea
          class="code-input"
          id="htmlInput"
          placeholder="Paste your HTML here..."
          spellcheck="false"
        ></textarea>
        <textarea
          class="code-input hidden"
          id="cssInput"
          placeholder="Paste your CSS here (optional — inline styles and &lt;style&gt; tags in HTML are auto-extracted)..."
          spellcheck="false"
        ></textarea>
        <textarea
          class="code-input hidden"
          id="jsInput"
          placeholder="Paste your JavaScript here (optional — &lt;script&gt; tags in HTML are auto-extracted)..."
          spellcheck="false"
        ></textarea>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider" id="divider"></div>

    <!-- Output Panel -->
    <div class="panel" id="outputPanel">
      <div class="panel-header">
        <span class="panel-title">Webflow JSON Output</span>
        <div class="panel-actions">
          <input
            type="text"
            class="class-prefix-input"
            id="classPrefixInput"
            placeholder="Class prefix (optional)"
            title="Set a unique prefix to avoid class name conflicts in Webflow"
          >
          <button class="btn" id="copyBtn" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Copy JSON
          </button>
          <button class="btn" id="copyClipboardBtn" disabled title="Copy as Webflow-pasteable clipboard data">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
            Copy for Webflow
          </button>
        </div>
      </div>
      <div class="code-container">
        <textarea
          class="output-area"
          id="output"
          readonly
          placeholder="Converted Webflow JSON will appear here..."
        ></textarea>
      </div>
      <div class="warnings hidden" id="warnings"></div>
    </div>
  </main>

  <div class="status-bar">
    <div class="status-left">
      <span class="status-item" id="statusNodes">Nodes: 0</span>
      <span class="status-item" id="statusStyles">Styles: 0</span>
    </div>
    <span class="status-item" id="statusMessage">Ready</span>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
